# Единый источник флагов статической musl-сборки: их читают и cross (CI),
# и scripts/build-musl.sh (локальный Docker). crt-static + relocation-model=static
# дают классический статический ET_EXEC без PT_INTERP — бинарник запускается
# на любом Linux соответствующей архитектуры без musl-загрузчика.

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static", "-C", "relocation-model=static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static", "-C", "relocation-model=static"]
