name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build static musl binary
        run: ./scripts/build-musl.sh
      - name: Checksum
        run: cd dist && sha256sum awgram-linux-amd64 > awgram-linux-amd64.sha256
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/awgram-linux-amd64
            dist/awgram-linux-amd64.sha256
          generate_release_notes: true
