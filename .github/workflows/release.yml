name: Release

on:
  push:
    tags: ["v*"]
  # Ручной запуск собирает бинарники без публикации релиза (dry-run сборки).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
          - arch: arm64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build static musl binary (${{ matrix.arch }})
        run: cross build --release --target ${{ matrix.target }}
      - name: Package and checksum
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/awgram" "dist/awgram-linux-${{ matrix.arch }}"
          cd dist
          sha256sum "awgram-linux-${{ matrix.arch }}" > "awgram-linux-${{ matrix.arch }}.sha256"
          file "awgram-linux-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v7
        with:
          name: awgram-linux-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      # checkout нужен ради install.sh: он прикладывается к релизу, чтобы
      # curl .../releases/latest/download/install.sh ставил скрипт той же
      # версии, что и бинарник (main может уезжать вперёд)
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      # Release notes = секция версии из CHANGELOG.md (двуязычные, ru/en).
      # Если секции нет — fallback на автогенерацию GitHub.
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {on=1; next}
            on && /^## \[/ {exit}
            on && /^\[[^]]+\]: / {next}   # keep-a-changelog link refs в конце файла
            on {print}
          ' CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHANGELOG.md has no section for ${GITHUB_REF_NAME#v} — falling back to auto-generated notes"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          files: |
            dist/awgram-linux-amd64
            dist/awgram-linux-amd64.sha256
            dist/awgram-linux-arm64
            dist/awgram-linux-arm64.sha256
            install.sh
