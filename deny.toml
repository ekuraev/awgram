[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2026-0173: proc-macro-error2 помечен как unmaintained (не vulnerability,
# без CVE/эксплойта). Приходит транзитивно через aquamarine <- teloxide и
# используется только на этапе компиляции (proc-macro для doc-комментариев),
# рантайм-поверхности атаки нет. Апстрим-замены на дату проверки (2026-07-14) нет.
ignore = [
  { id = "RUSTSEC-2026-0173", reason = "unmaintained proc-macro (compile-time only) via aquamarine <- teloxide; no CVE, no fix available upstream" },
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]

# ring не декларирует SPDX-лицензию в Cargo.toml — уточняем вручную (стандартный сниппет).
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]
